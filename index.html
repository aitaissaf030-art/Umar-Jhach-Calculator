<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umar Jhach Age Calculator</title>

<style>

body{
font-family:Arial;
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#43cea2);
}

.container{
background:white;
padding:25px;
border-radius:15px;
width:320px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
text-align:center;
}

input{
width:100%;
padding:10px;
margin-top:10px;
border-radius:8px;
border:1px solid #ccc;
}

button{
margin-top:15px;
padding:10px;
width:100%;
border:none;
border-radius:8px;
background:#0072ff;
color:white;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:15px;
font-size:14px;
text-align:left;
}

</style>

</head>

<body>

<div class="container">

<h2>Age Calculator</h2>

<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

</div>

<script>

function getZodiac(day,month){

const zodiac=[
["Capricorn",20],
["Aquarius",19],
["Pisces",21],
["Aries",20],
["Taurus",21],
["Gemini",21],
["Cancer",23],
["Leo",23],
["Virgo",23],
["Libra",23],
["Scorpio",22],
["Sagittarius",22],
["Capricorn",31]
];

return (day<zodiac[month][1])?zodiac[month][0]:zodiac[month+1][0];

}

function calculateAge(){

let dob=document.getElementById("dob").value;

if(!dob){
alert("Select date of birth");
return;
}

let birth=new Date(dob);
let today=new Date();

let years=today.getFullYear()-birth.getFullYear();
let months=today.getMonth()-birth.getMonth();
let days=today.getDate()-birth.getDate();

if(days<0){
months--;
days+=30;
}

if(months<0){
years--;
months+=12;
}

let diff=today-birth;

let totalDays=Math.floor(diff/(1000*60*60*24));
let totalWeeks=Math.floor(totalDays/7);
let totalMonths=Math.floor(totalDays/30);
let totalHours=Math.floor(diff/(1000*60*60));

let nextBirthday=new Date(today.getFullYear(),birth.getMonth(),birth.getDate());

if(today>nextBirthday){
nextBirthday.setFullYear(today.getFullYear()+1);
}

let birthdayDays=Math.ceil((nextBirthday-today)/(1000*60*60*24));

let zodiac=getZodiac(birth.getDate(),birth.getMonth());

let dayName=birth.toLocaleDateString('en-US',{weekday:'long'});

document.getElementById("result").innerHTML=`

<b>Age:</b> ${years} Years ${months} Months ${days} Days<br><br>

<b>Total Months:</b> ${totalMonths}<br>
<b>Total Weeks:</b> ${totalWeeks}<br>
<b>Total Days:</b> ${totalDays}<br>
<b>Total Hours:</b> ${totalHours}<br><br>

<b>Next Birthday In:</b> ${birthdayDays} Days<br>
<b>Zodiac Sign:</b> ${zodiac}<br>
<b>Day of Birth:</b> ${dayName}

`;

}

</script>

</body>
</html>
