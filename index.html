<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Umar Jhach Calculator</title>

<style>

body{
margin:0;
font-family:Arial;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#43cea2);
}

.calculator{
background:white;
padding:20px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
width:300px;
}

#display{
width:100%;
height:50px;
font-size:20px;
margin-bottom:10px;
text-align:right;
padding-right:10px;
border-radius:10px;
border:1px solid #ddd;
}

.buttons{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:10px;
}

button{
height:50px;
font-size:18px;
border:none;
border-radius:10px;
background:#f2f2f2;
cursor:pointer;
}

button:hover{
background:#ddd;
}

.equal{
background:#0072ff;
color:white;
}

.clear{
background:#ff4b2b;
color:white;
}

</style>
</head>

<body>

<div class="calculator">

<input id="display" readonly>

<div class="buttons">

<button onclick="clearDisplay()" class="clear">C</button>
<button onclick="backspace()">⌫</button>
<button onclick="percent()">%</button>
<button onclick="append('/')">÷</button>

<button onclick="append('7')">7</button>
<button onclick="append('8')">8</button>
<button onclick="append('9')">9</button>
<button onclick="append('*')">×</button>

<button onclick="append('4')">4</button>
<button onclick="append('5')">5</button>
<button onclick="append('6')">6</button>
<button onclick="append('-')">−</button>

<button onclick="append('1')">1</button>
<button onclick="append('2')">2</button>
<button onclick="append('3')">3</button>
<button onclick="append('+')">+</button>

<button onclick="square()">x²</button>
<button onclick="sqrt()">√</button>
<button onclick="inverse()">1/x</button>
<button onclick="calculate()" class="equal">=</button>

<button onclick="append('0')" style="grid-column:span 2;">0</button>
<button onclick="append('.')">.</button>

</div>

</div>

<script>

function append(value){
document.getElementById("display").value += value;
}

function clearDisplay(){
document.getElementById("display").value="";
}

function backspace(){
let d=document.getElementById("display");
d.value=d.value.slice(0,-1);
}

function calculate(){
let d=document.getElementById("display");
try{
d.value=eval(d.value);
}catch{
d.value="Error";
}
}

function percent(){
let d=document.getElementById("display");
d.value=d.value/100;
}

function square(){
let d=document.getElementById("display");
d.value=d.value*d.value;
}

function sqrt(){
let d=document.getElementById("display");
d.value=Math.sqrt(d.value);
}

function inverse(){
let d=document.getElementById("display");
d.value=1/d.value;
}

</script>

</body>
</html>
